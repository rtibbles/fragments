<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="80" ry="80"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="512" height="512" fill="#1a1a2e"/>

    <!-- Fragment 1 - top left - amber -->
    <polygon points="60,60 240,60 200,180 120,240 60,200" fill="#f0a030"/>

    <!-- Fragment 2 - top right - teal -->
    <polygon points="260,60 452,60 452,180 380,260 240,200" fill="#2ec4b6"/>

    <!-- Fragment 3 - center - warm white -->
    <polygon points="200,196 260,196 300,270 256,320 200,270" fill="#f0ece6"/>

    <!-- Fragment 4 - bottom left - teal -->
    <polygon points="60,216 120,256 196,286 160,400 60,452" fill="#2ec4b6"/>

    <!-- Fragment 5 - bottom right - amber -->
    <polygon points="316,280 396,276 452,340 452,452 180,452 176,416" fill="#f0a030"/>
  </g>
</svg>
